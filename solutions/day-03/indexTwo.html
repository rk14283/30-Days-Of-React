<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise</title>
  </head>

  <body>
    <div class="root"></div>

    <script
      cross
      origin
      src="https://unpkg.com/react@16/umd/react.development.js"
    ></script>
    <script
      cross
      origin
      src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style></style>
    <script type="text/babel">
      const numOne = 3;
      const numTwo = 2;
      const techs = ["HTML", "CSS", "JavaScript"];
      // To get the root element from the HTML document
      const rootElement = document.querySelector(".root");

      // JSX element
      const header = (
        <header>
          <h1>Welcome to 30 Days Of React</h1>
          <h2>Getting Started React</h2>
          <h3>JavaScript Library</h3>
          <p>Asabeneh Yetayeh</p>
          <small>Oct 2, 2020</small>
        </header>
      );
      // JSX element, main

      const mainStyle = {
        backgroundColor: "blue",
        textAlign: "justify",
        padding: 10,
      };
      const footerStyle = {
        backgroundColor: "green",
        textAlign: "justify",
        padding: 10,
      };

      const appStyle = {
        backgroundColor: "red",
        textAlign: "justify",
        padding: 10,
      };
      const main = (
        <main style={mainStyle}>
          <p>Prerequisite to get started react.js:</p>
          <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
          </ul>
        </main>
      );

      // JSX element for the footer part of the website
      const footer = (
        <footer style={footerStyle}>
          <p>Copyright 2020</p>
        </footer>
      );
      const techsList = techs.map((tech, index) => <li key={index}>{tech}</li>);

      const techsUsed = (
        <main>
          <div className="main-wrapper">
            <p>
              Prerequisite to get started{" "}
              <strong>
                <em>react.js</em>
              </strong>
              :
            </p>
            <ul>{techsList}</ul>
          </div>
        </main>
      );

      // JSX element which contain all, it is a container or parent
      const app = (
        <div>
          {header}
          {main}
          {footer}

          {techsUsed}
        </div>
      );

      // we render the JSX element using the ReactDOM package// ReactDOM has the render method and the render method takes two arguments
      ReactDOM.render(app, rootElement);
    </script>
  </body>
</html>
